name: release
on:
  push:
    branches: [main]

jobs:
  code:
    uses: cyberuni/.github/.github/workflows/pnpm-verify.yml@v1
    with:
      os: '["ubuntu-latest"]'
      skip-codecov: true
  codecov:
    uses: cyberuni/.github/.github/workflows/pnpm-codecov.yml@v1
    with:
      files: ./packages/resolve.imports/coverage/lcov.info
      flags: resolve.imports

  release:
    uses: cyberuni/.github/.github/workflows/pnpm-release-changeset.yml@v1
    needs: code
    secrets: inherit
